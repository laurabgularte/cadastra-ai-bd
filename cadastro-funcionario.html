<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Funcionário - Cadastra Aí</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h1>Novo Funcionário</h1>
        <p style="text-align: center; margin-bottom: 20px; color: #666;">Preencha os dados abaixo</p>
        
        <form id="employeeForm">
            <div class="form-group">
                <label for="fullName">Nome Completo</label>
                <input type="text" id="fullName" name="fullName" placeholder="Ex: João da Silva" required>
            </div>
            
            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
            </div>

            <div class="form-group">
                <label for="role">Cargo</label>
                <select id="role" name="role" class="custom-select" required>
                    <option value="">Selecione um cargo</option>
                    <option value="garcom">Garçom / Garçonete</option>
                    <option value="cozinheiro">Cozinheiro(a)</option>
                    <option value="caixa">Operador de Caixa</option>
                    <option value="gerente">Gerente</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">E-mail de Acesso</label>
                <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
            </div>

            <button type="submit" id="btnCadastrar">Finalizar Cadastro</button>
            
            <a href="dashboard.html" class="back-link">← Voltar para o Painel</a>
        </form>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
