<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Cadastra Aí</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="user-info" style="display: flex; align-items: center; gap: 15px;">
                <span>Bem-vindo,<strong>Administrador</strong></span>
                <a href="index.html" class="logout-btn">Sair</a>
            </div>
        </header>

        <main class="dashboard-content">
            <section class="stats-grid">
                <div class="stat-card">
                    <h3>Funcionários</h3>
                    <p class="stat-number">12</p>
                </div>
                <div class="stat-card">
                    <h3>Mesas Ativas</h3>
                    <p class="stat-number">5</p>
                </div>
                <div class="stat-card">
                    <h3>Total de Pedidos Hoje</h3>
                    <p class="stat-number">48</p>
                </div>
            </section>
            <section class="actions-grid">
    <a href="cadastro-funcionario.html" class="action-card">
        <div class="icon">👥</div>
        <h3>Funcionários</h3>
        <p>Cadastrar e gerenciar</p>
    </a>

    <a href="cardapio.html" class="action-card">
        <div class="icon">🍕</div>
        <h3>Cardápio</h3>
        <p>Editar pratos e preços</p>
    </a>

    <a href="relatorios.html" class="action-card">
        <div class="icon">📊</div>
        <h3>Relatórios</h3>
        <p>Vendas e desempenho</p>
    </a>

    <a href="configuracoes.html" class="action-card">
        <div class="icon">⚙️</div>
        <h3>Ajustes</h3>
        <p>Configurações gerais</p>
    </a>
</section>
        </main>
    </div>
</body>
</html>
