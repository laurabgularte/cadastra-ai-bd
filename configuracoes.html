<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Cadastra Aí</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>Configurações do Sistema</h1>
            <div class="user-info">
                <a href="dashboard.html" class="logout-btn">Voltar ao Painel</a>
            </div>
        </header>

        <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
            
            <div class="stat-card" style="text-align: left; padding: 25px;">
                <h3 style="color: #4338ca; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px;">👤 Meu Perfil</h3>
                
                <div class="form-group" style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 13px; color: #64748b; font-weight: 600;">Nome do Usuário:</label>
                    <p style="font-weight: 600; color: #1e293b;">Administrador</p>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 13px; color: #64748b; font-weight: 600;">E-mail de Acesso:</label>
                    <p style="font-weight: 600; color: #1e293b;">admin@restaurante.com</p>
                </div>

                <button class="logout-btn" style="width: 100%; text-align: center; background: #f1f5f9; color: #4338ca; border: 1px solid #e2e8f0;">Editar Dados</button>
            </div>

            <div class="stat-card" style="text-align: left; padding: 25px;">
                <h3 style="color: #4338ca; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px;">🔑 Segurança</h3>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 12px; margin-bottom: 5px; font-weight: 600;">Nova Senha:</label>
                    <input type="password" placeholder="••••••••" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 12px; margin-bottom: 5px; font-weight: 600;">Confirmar Senha:</label>
                    <input type="password" placeholder="••••••••" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc;">
                </div>

                <button class="btn-filter" style="width: 100%; background: #4338ca;">Atualizar Senha</button>
            </div>

            <div class="stat-card" style="text-align: left; padding: 25px;">
                <h3 style="color: #4338ca; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px;">🏢 Empresa</h3>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 12px; margin-bottom: 5px; font-weight: 600;">Nome do Restaurante:</label>
                    <input type="text" value="Restaurante Vitória" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 12px; margin-bottom: 5px; font-weight: 600;">Valor Almoço Livre (R$):</label>
                    <input type="number" value="25.00" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc;">
                </div>
<div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 12px; margin-bottom: 5px; font-weight: 600;">Valor Almoço por Kg (R$):</label>
                    <input type="number" value="25.00" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc;">
                </div>
                <button class="btn-filter" style="width: 100%;">Salvar Ajustes</button>
