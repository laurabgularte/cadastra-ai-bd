<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cadastra Aí</title>
    <link rel="stylesheet" href="dashboard.css">
    <style>
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            color: #4338ca;
            font-weight: 800;
            margin-bottom: 10px;
            font-size: 26px;
        }

        .login-card p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #4338ca;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #3730a3;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 56, 202, 0.3);
        }

        #errorMessage {
            background: #fee2e2;
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #fecaca;
            font-size: 13px;
            margin-top: 20px;
            display: none; 
            font-weight: 600;
        }

        .login-footer {
            margin-top: 25px;
            font-size: 13px;
        }

        .login-footer a {
            color: #4338ca;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Cadastra Aí</h2>
        <p>Controle de Almoço de Funcionários</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail de Acesso</label>
                <input type="email" id="email" placeholder="admin@restaurante.com" required 
                       style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required
                       style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;">
            </div>

            <button type="submit" class="btn-login">Acessar Painel</button>
            
            <div id="errorMessage">
                ❌ E-mail ou senha incorretos!
            </div>
        </form>

        <div class="login-footer">
            <a href="#">Esqueceu sua senha?</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            // credenciais Fictícias por enquanto (substituir por autenticação real no futuro)

            const emailCorreto = "admin@restaurante.com";
            const senhaCorreta = "123456";

            const emailDigitado = document.getElementById('email').value;
            const senhaDigitada = document.getElementById('password').value;
            const msgErro = document.getElementById('errorMessage');

            
            if (emailDigitado === emailCorreto && senhaDigitada === senhaCorreta) {
                
                window.location.href = "dashboard.html";
            } else {
                
                msgErro.style.display = "block";
                
             
                document.getElementById('password').value = "";
                
                
                setTimeout(() => {
                    msgErro.style.display = "none";
                }, 3000);
            }
        });
    </script>

</body>
</html>
